<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Central-De-Alertas-PGM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:#f0f4f8;color:#0d1117;padding:20px}
.header{background:linear-gradient(90deg,#1a5a6c,#0f9668);color:#fff;padding:20px;border-radius:10px;margin-bottom:20px}
.header h1{font-size:24px;font-weight:700}
.header p{font-size:14px;opacity:0.9;margin-top:5px}
.container{max-width:1200px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-bottom:30px}
.card{background:#fff;border:1px solid #e4e9f0;border-radius:10px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.card h3{color:#1a5a6c;font-size:14px;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px}
.card .value{font-size:32px;font-weight:800;color:#0f9668;margin:10px 0}
.card .label{font-size:12px;color:#8492a6}
.button{display:inline-block;padding:10px 20px;background:#0f9668;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;margin:5px 5px 5px 0}
.button:hover{background:#1abd82}
.button.red{background:#ff4757}
.button.red:hover{background:#ff6b7a}
.loading{text-align:center;padding:40px;color:#8492a6}
.error{background:#fff5f5;border:1px solid #ff4757;color:#ff4757;padding:15px;border-radius:6px;margin:20px 0}
table{width:100%;border-collapse:collapse;margin-top:20px}
table th{background:#1a5a6c;color:#fff;padding:12px;text-align:left;font-size:12px;font-weight:600;text-transform:uppercase}
table td{padding:10px 12px;border-bottom:1px solid #e4e9f0}
table tr:hover{background:#f8f9fb}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>⚡ Central-De-Alertas-PGM</h1>
    <p>Controle de Prazos Processuais - PGM Porto Velho</p>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Total</h3>
      <div class="value" id="kpi-total">—</div>
      <div class="label">Processos na unidade</div>
    </div>
    <div class="card">
      <h3>Cumpridos</h3>
      <div class="value" id="kpi-cumpridos">—</div>
      <div class="label">Taxa: <span id="kpi-taxa">0</span>%</div>
    </div>
    <div class="card">
      <h3>Próximos 7 dias</h3>
      <div class="value" id="kpi-proximos">—</div>
      <div class="label">Atenção urgente</div>
    </div>
    <div class="card">
      <h3>Vencidos</h3>
      <div class="value" id="kpi-vencidos">—</div>
      <div class="label">Críticos</div>
    </div>
  </div>

  <div class="card">
    <h2 style="margin-bottom:20px">Relatórios</h2>
    <button class="button" onclick="gerarPDF('semanal')">📋 Semanal</button>
    <button class="button" onclick="gerarPDF('mensal')">📊 Mensal</button>
    <button class="button" onclick="gerarPDF('criticos')">⚠️ Críticos</button>
    <button class="button red" onclick="location.reload()">🔄 Atualizar</button>
  </div>

  <div class="card">
    <h2 style="margin-bottom:20px">Dados</h2>
    <div id="dados-container">
      <div class="loading">Carregando dados...</div>
    </div>
  </div>
</div>

<script>
var VENCIDOS_DATA=[],PROXIMOS7=[],CUMPRIDOS_DATA=[],DADOS_CACHE={};

function getToken(){
    var url=new URLSearchParams(window.location.search);
    return url.get('token')||'pgm-contenciosa-2026';
}

async function carregarDados(){
    try{
        var token=getToken();
        var res=await fetch('/api/dashboard?token='+token);
        if(!res.ok) throw new Error('Erro '+res.status);
        
        var data=await res.json();
        console.log('Dados recebidos:',data);
        
        DADOS_CACHE=data;
        VENCIDOS_DATA=data.vencidos_lista||[];
        PROXIMOS7=data.proximos_lista||[];
        
        document.getElementById('kpi-total').textContent=data.total||0;
        document.getElementById('kpi-cumpridos').textContent=data.cumpridos||0;
        document.getElementById('kpi-proximos').textContent=data.proximos||0;
        document.getElementById('kpi-vencidos').textContent=data.vencidos||0;
        document.getElementById('kpi-taxa').textContent=Math.round(data.taxa||0);
        
        var html='<p style="color:#0d1117"><strong>✅ Dados carregados com sucesso!</strong></p>';
        html+='<table><tr><th>Métrica</th><th>Valor</th></tr>';
        html+='<tr><td>Total</td><td>'+data.total+'</td></tr>';
        html+='<tr><td>Cumpridos</td><td>'+data.cumpridos+'</td></tr>';
        html+='<tr><td>Vencidos</td><td>'+data.vencidos+'</td></tr>';
        html+='<tr><td>Próximos 7 dias</td><td>'+data.proximos+'</td></tr>';
        html+='<tr><td>Taxa de cumprimento</td><td>'+data.taxa.toFixed(1)+'%</td></tr>';
        html+='</table>';
        
        document.getElementById('dados-container').innerHTML=html;
        
    }catch(e){
        console.error('Erro ao carregar:',e.message);
        document.getElementById('dados-container').innerHTML='<div class="error">❌ Erro ao carregar dados: '+e.message+'</div>';
    }
}

function gerarPDF(tipo){
    alert('Gerar PDF tipo: '+tipo);
}

carregarDados();
</script>

</body>
</html>

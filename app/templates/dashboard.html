<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Subprocuradoria Contenciosa — PGM Porto Velho</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script type="application/json" id="dados-proximos">[]</script>
<script type="application/json" id="dados-vencidos">[]</script>
<style>
:root{
  --bg:#080c14;
  --bg2:#0d1220;
  --bg3:#111827;
  --surface:#131c2e;
  --surface2:#1a2540;
  --border:#1e2d45;
  --border2:#263554;
  --text:#f0f4ff;
  --text2:#8899bb;
  --text3:#4a607a;
  --accent:#3b7fff;
  --accent2:#5b9aff;
  --accent-glow:rgba(59,127,255,.18);
  --red:#ff4757;
  --red-dim:rgba(255,71,87,.12);
  --amber:#ffb300;
  --amber-dim:rgba(255,179,0,.12);
  --green:#00c875;
  --green-dim:rgba(0,200,117,.12);
  --r:14px; --r2:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

/* HEADER */
.hdr{
  background:rgba(8,12,20,.92);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(16px);
  position:sticky;top:0;z-index:200;
}
.hdr-in{max-width:1400px;margin:0 auto;padding:0 28px;height:62px;display:flex;align-items:center;gap:20px}
.hdr-logo{display:flex;align-items:center;gap:10px}
.hdr-emblem{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#2563eb,#3b7fff);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 16px rgba(59,127,255,.4);
}
.hdr-emblem svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2}
.hdr-brand{font-size:13px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.hdr-sub{font-size:10px;color:var(--text3);margin-top:1px;letter-spacing:.02em}
.hdr-divider{width:1px;height:28px;background:var(--border);margin:0 8px}
.hdr-title{font-size:13px;font-weight:500;color:var(--text2);flex:1;text-align:center}
.hdr-actions{display:flex;align-items:center;gap:8px}
.hdr-pill{
  display:flex;align-items:center;gap:5px;
  padding:5px 11px;border-radius:20px;
  background:var(--surface);border:1px solid var(--border);
  font-size:11px;color:var(--text2);cursor:pointer;
  transition:all .18s;font-family:'Inter',sans-serif;
}
.hdr-pill:hover{border-color:var(--accent);color:var(--accent)}
.hdr-pill svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}

/* LAYOUT */
.layout{display:flex;max-width:1400px;margin:0 auto;padding:24px 28px;gap:20px}

/* SIDEBAR */
.sdb{width:210px;flex-shrink:0}
.sdb-nav{display:flex;flex-direction:column;gap:2px;position:sticky;top:86px}
.sdb-section{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:16px 10px 6px}
.ni{
  display:flex;align-items:center;gap:9px;
  padding:9px 12px;border-radius:var(--r2);
  color:var(--text2);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .15s;border:none;background:none;
  font-family:'Inter',sans-serif;width:100%;text-align:left;
  position:relative;
}
.ni svg{width:15px;height:15px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.8}
.ni:hover{background:var(--surface);color:var(--text)}
.ni.active{
  background:var(--surface2);color:var(--accent2);font-weight:600;
  border:1px solid var(--border2);
}
.ni.active::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:2px;background:var(--accent);border-radius:0 2px 2px 0;
}
.nbadge{
  margin-left:auto;font-size:10px;font-weight:700;
  padding:1px 7px;border-radius:10px;
  background:var(--red-dim);color:var(--red);
  border:1px solid rgba(255,71,87,.2);
}
.ni.active .nbadge{background:rgba(59,127,255,.15);color:var(--accent2);border-color:rgba(59,127,255,.25)}

/* MAIN */
.main{flex:1;min-width:0}
.tab-content{display:none}
.tab-content.active{display:block;animation:fu .22s ease}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* PAGE HEAD */
.ph{margin-bottom:24px}
.ph h2{font-size:24px;font-weight:800;letter-spacing:-.03em;color:var(--text)}
.ph p{font-size:13px;color:var(--text3);margin-top:4px}

/* KPI */
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.kc{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:20px;
  position:relative;overflow:hidden;
  transition:border-color .2s,box-shadow .2s;cursor:default;
}
.kc:hover{border-color:var(--border2);box-shadow:0 4px 24px rgba(0,0,0,.3)}
.kc-glow{
  position:absolute;top:-40px;right:-40px;
  width:100px;height:100px;border-radius:50%;
  opacity:.6;filter:blur(30px);pointer-events:none;
}
.kc.blue .kc-glow{background:var(--accent)}
.kc.red .kc-glow{background:var(--red)}
.kc.amber .kc-glow{background:var(--amber)}
.kc.green .kc-glow{background:var(--green)}
.kc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.kc-lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.kc-ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center

<style>
/* RESTAURANDO TODOS OS SEUS ESTILOS ORIGINAIS */
:root{
  --bg:#080c14; --bg2:#0d1220; --bg3:#111827; --surface:#131c2e; --surface2:#1a2540;
  --border:#1e2d45; --border2:#263554; --text:#f0f4ff; --text2:#8899bb; --text3:#4a607a;
  --accent:#3b7fff; --accent2:#5b9aff; --accent-glow:rgba(59,127,255,.18);
  --red:#ff4757; --red-dim:rgba(255,71,87,.12); --amber:#ffb300; --amber-dim:rgba(255,179,0,.12);
  --green:#00c875; --green-dim:rgba(0,200,117,.12); --r:14px; --r2:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

.hdr{background:rgba(8,12,20,.92);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);position:sticky;top:0;z-index:200}
.hdr-in{max-width:1400px;margin:0 auto;padding:0 28px;height:62px;display:flex;align-items:center;gap:20px}
.hdr-logo{display:flex;align-items:center;gap:10px}
.hdr-emblem{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#2563eb,#3b7fff);display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(59,127,255,.4)}
.hdr-brand{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.02em}

.layout{display:flex;max-width:1400px;margin:0 auto;padding:24px 28px;gap:20px}
.sdb{width:210px;flex-shrink:0}
.ni{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:var(--r2);color:var(--text2);cursor:pointer;background:none;border:none;width:100%;text-align:left;font-family:inherit;transition:all .15s;position:relative}
.ni.active{background:var(--surface2);color:var(--accent2);font-weight:600;border:1px solid var(--border2)}
.ni svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}
.nbadge{margin-left:auto;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;background:var(--red-dim);color:var(--red)}

.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.kc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative;overflow:hidden}
.kc-glow{position:absolute;top:-40px;right:-40px;width:100px;height:100px;border-radius:50%;opacity:.6;filter:blur(30px)}
.kc.blue .kc-glow{background:var(--accent)} .kc.red .kc-glow{background:var(--red)} .kc.amber .kc-glow{background:var(--amber)} .kc.green .kc-glow{background:var(--green)}
.kc-val{font-size:36px;font-weight:800;line-height:1;margin:10px 0}
.kc-lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px}
.tw{overflow-x:auto;border-radius:var(--r2);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;border-bottom:1px solid var(--border)}
td{padding:9px 12px;border-bottom:1px solid rgba(30,45,69,.6);font-size:12px}

.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.br{background:var(--red-dim);color:var(--red)} .ba{background:var(--amber-dim);color:var(--amber)} .bg{background:var(--green-dim);color:var(--green)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--r2);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
.btn-blue{background:var(--accent);color:#fff}
.fi{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r2);background:var(--surface);color:var(--text);font-size:13px}
#pdf-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:9999;align-items:center;justify-content:center;color:#fff;flex-direction:column}
</style>
</head>
